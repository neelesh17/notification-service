name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: ./mvnw clean compile -Dapp.providers.sendgrid.api-key=test -Dapp.providers.sendgrid.from-email=test@test.com -Dapp.providers.firebase.credentials-path=test -Dapp.providers.twilio.account-sid=test -Dapp.providers.twilio.auth-token=test -Dapp.providers.twilio.from-number=+1234567890 -Dapp.redis.rate-limit.max-requests=10

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test
        run: ./mvnw test -Dapp.providers.sendgrid.api-key=test -Dapp.providers.sendgrid.from-email=test@test.com -Dapp.providers.firebase.credentials-path=test -Dapp.providers.twilio.account-sid=test -Dapp.providers.twilio.auth-token=test -Dapp.providers.twilio.from-number=+1234567890 -Dapp.redis.rate-limit.max-requests=10

  sonar:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build for Sonar
        run: ./mvnw clean verify -Dapp.providers.sendgrid.api-key=test -Dapp.providers.sendgrid.from-email=test@test.com -Dapp.providers.firebase.credentials-path=test -Dapp.providers.twilio.account-sid=test -Dapp.providers.twilio.auth-token=test -Dapp.providers.twilio.from-number=+1234567890 -Dapp.redis.rate-limit.max-requests=10

      - name: SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.java.binaries=target/classes
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
  ```

The flow is now:
  ```
  secret-scan → build → test → sonar