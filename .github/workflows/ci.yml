name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        # this scans for accidentally committed credentials
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Build
        run: ./mvnw clean compile -Dapp.providers.sendgrid.api-key=test -Dapp.providers.sendgrid.from-email=test@test.com -Dapp.providers.firebase.credentials-path=test -Dapp.providers.twilio.account-sid=test -Dapp.providers.twilio.auth-token=test -Dapp.providers.twilio.from-number=+1234567890 -Dapp.redis.rate-limit.max-requests=10

      - name: Test
        run: ./mvnw test -Dapp.providers.sendgrid.api-key=test -Dapp.providers.sendgrid.from-email=test@test.com -Dapp.providers.firebase.credentials-path=test -Dapp.providers.twilio.account-sid=test -Dapp.providers.twilio.auth-token=test -Dapp.providers.twilio.from-number=+1234567890 -Dapp.redis.rate-limit.max-requests=10


      - name: SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.java.binaries=target/classes
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml